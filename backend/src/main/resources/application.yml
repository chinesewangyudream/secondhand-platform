server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: secondhand-backend

  datasource:
    url: jdbc:mysql://localhost:3307/secondhand_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456  # ?? ???????
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-test-query: SELECT 1

  redis:
    host: localhost
    port: 6379
    password:           # Redis????????
    database: 0
    timeout: 10000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT??
jwt:
  secret: secondhand_jwt_secret_key_2024_very_long_string_for_security
  expiration: 86400000   # 24?? ??
  refresh-expiration: 604800000  # 7?

# ??????
upload:
  path: /uploads/       # ?? ???????
  url-prefix: http://localhost:8080/api/uploads/

# AI???? (??OpenAI????)
ai:
  api-key: sk-2debee73cc0f4727962258d95c604161  # DeepSeek API Key
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat

logging:
  level:
    com.secondhand: debug
    org.springframework.jdbc.datasource: DEBUG
    com.zaxxer.hikari: DEBUG
    org.springframework.jdbc.core: DEBUG
